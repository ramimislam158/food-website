<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — YOSHI ヨシ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700;800&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
<div class="admin-login-wrap">
  <div class="admin-login-card glass-card">
    <div class="logo-lockup">
      <h1>YOSHI <span>ヨシ</span></h1>
      <p>Admin Dashboard</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-primary w-full" style="margin-top:8px">Enter Dashboard</button>
      <div class="form-msg" id="loginMsg"></div>
    </form>
    <p style="margin-top:24px;font-size:0.75rem;color:rgba(255,255,255,0.2);text-align:center">
      Restricted access · YOSHI Management
    </p>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const msg = document.getElementById('loginMsg');
  const data = Object.fromEntries(new FormData(e.target));
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      window.location.href = '/admin/dashboard.html';
    } else {
      msg.textContent = 'Invalid credentials.';
      msg.className = 'form-msg error';
    }
  } catch {
    // Demo: accept admin/admin123
    if (data.username === 'admin' && data.password === 'admin123') {
      sessionStorage.setItem('yoshi_admin', '1');
      window.location.href = '/admin/dashboard.html';
    } else {
      msg.textContent = 'Invalid credentials. Try admin / admin123';
      msg.className = 'form-msg error';
    }
  }
});
</script>
</body>
</html>
